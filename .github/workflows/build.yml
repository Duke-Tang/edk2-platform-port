name: Build Quanta Platform Firmware

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y gcc nasm acpica-tools python3 uuid-dev

      - name: Cache edk2 + BaseTools
        id: cache-edk2
        uses: actions/cache@v4
        with:
          path: ~/edk2
          key: edk2-stable202405-${{ runner.os }}-v2

      - name: Clone edk2 (edk2-stable202405) + submodules
        if: steps.cache-edk2.outputs.cache-hit != 'true'
        run: |
          git clone --branch edk2-stable202405 --depth=1 \
            --recurse-submodules --shallow-submodules \
            https://github.com/tianocore/edk2.git ~/edk2

      - name: Build BaseTools
        if: steps.cache-edk2.outputs.cache-hit != 'true'
        run: make -C ~/edk2/BaseTools -j$(nproc)

      - name: Build firmware (DEBUG)
        run: bash build.sh DEBUG

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: QUANTA-firmware-DEBUG
          path: Build/QuantaX64/DEBUG_GCC/FV/QUANTA.fd
          if-no-files-found: error
