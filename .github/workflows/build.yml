name: Build Quanta Platform Firmware

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  EDK2_REF: edk2-stable202605

jobs:
  build:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        target: [DEBUG, RELEASE]

    steps:
      - name: Checkout QuantaPkg platform repo
        uses: actions/checkout@v4
        with:
          path: edk2-platform-port

      - name: Checkout edk2
        uses: actions/checkout@v4
        with:
          repository: tianocore/edk2
          ref: ${{ env.EDK2_REF }}
          submodules: recursive
          path: edk2

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential uuid-dev iasl nasm \
            python3 python3-pip \
            gcc g++ make git acpica-tools

      - name: Build BaseTools
        working-directory: edk2
        run: make -C BaseTools

      - name: Build QuantaPkg (${{ matrix.target }})
        run: |
          export WORKSPACE=$GITHUB_WORKSPACE
          export PACKAGES_PATH=$WORKSPACE/edk2:$WORKSPACE/edk2-platform-port
          export EDK_TOOLS_PATH=$WORKSPACE/edk2/BaseTools
          cd $WORKSPACE/edk2
          source edksetup.sh BaseTools

          build \
            -a X64 \
            -t GCC5 \
            -b ${{ matrix.target }} \
            -p $WORKSPACE/edk2-platform-port/QuantaPkg/QuantaPkgX64.dsc

      - name: Upload firmware artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: QuantaPkg-${{ matrix.target }}-X64
          path: |
            edk2/Build/**/FV/*.fd
            edk2/Build/**/FV/*.rom
            edk2/Build/**/*.efi
          if-no-files-found: warn
          retention-days: 14
